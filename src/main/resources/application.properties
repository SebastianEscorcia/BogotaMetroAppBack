spring.application.name=BogotaMetroApp
# Swagger UI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

spring.datasource.url=jdbc:mysql://localhost:3306/nombrebasededatos?useSSL=false&serverTimezone=UTC
spring.datasource.username=tuusuario
spring.datasource.password=tuclave

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Info de la API
springdoc.info.title=BogotaMetro API
springdoc.info.description=API REST para gestión del sistema de metro de Bogotá
springdoc.info.version=1.0.0
springdoc.info.contact.name=SENA
springdoc.info.contact.email=soporte@bogotametro.com